<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دردشة المجموعات - Firebase</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;500;600;700&display=swap');
        body { font-family: 'Noto Sans Arabic', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
        .chat-container { height: calc(100vh - 140px); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <!-- Firebase SDKs (Modular v10) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithRedirect, getRedirectResult, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, serverTimestamp, onSnapshot, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // إعدادات Firebase المخصصة (AI Studio Managed)
        const firebaseConfig = {
          apiKey: "AIzaSyDgfLujLrCYf0Ck_iYq0DSPwQwwtjQumAc",
          authDomain: "gen-lang-client-0715906177.firebaseapp.com",
          projectId: "gen-lang-client-0715906177",
          storageBucket: "gen-lang-client-0715906177.firebasestorage.app",
          messagingSenderId: "406861062127",
          appId: "1:406861062127:web:08a6da4c07e5664db4a01a",
          firestoreDatabaseId: "ai-studio-c9c2b24c-214e-496b-ad6d-87bb0696b51c"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app, firebaseConfig.firestoreDatabaseId);
        const googleProvider = new GoogleAuthProvider();

        // تصدير الدوال للنافذة العالمية ليستخدمها React
        window.firebaseApp = { 
            auth, db, googleProvider, 
            signInWithRedirect, getRedirectResult, signOut, onAuthStateChanged, 
            collection, addDoc, serverTimestamp, onSnapshot, query, orderBy, limit 
        };
    </script>

    <!-- React Application -->
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function App() {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [message, setMessage] = useState("");
            const [chatMessages, setChatMessages] = useState([]);
            const [status, setStatus] = useState("");
            const scrollRef = useRef(null);

            useEffect(() => {
                if (scrollRef.current) scrollRef.current.scrollIntoView({ behavior: "smooth" });
            }, [chatMessages]);

            useEffect(() => {
                let unsubscribeAuth = null;
                let unsubscribeChat = null;

                const init = async () => {
                    if (!window.firebaseApp) {
                        setTimeout(init, 100);
                        return;
                    }

                    const { auth, getRedirectResult, onAuthStateChanged, db, collection, query, orderBy, limit, onSnapshot } = window.firebaseApp;

                    // معالجة نتيجة إعادة التوجيه فور التحميل
                    try {
                        const result = await getRedirectResult(auth);
                        if (result) {
                            setStatus("تم تسجيل الدخول بنجاح!");
                            setTimeout(() => setStatus(""), 3000);
                        }
                    } catch (error) {
                        console.error("Redirect Error:", error.message);
                        if (error.code === 'auth/unauthorized-domain') {
                            setStatus("خطأ: النطاق غير مصرح به في Firebase.");
                        }
                    }

                    // مراقب حالة تسجيل الدخول
                    unsubscribeAuth = onAuthStateChanged(auth, (currentUser) => {
                        setUser(currentUser);
                        setLoading(false);
                    });

                    // مراقب الرسائل في Firestore
                    const q = query(collection(db, "messages"), orderBy("createdAt", "desc"), limit(50));
                    unsubscribeChat = onSnapshot(q, (snapshot) => {
                        const msgs = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })).reverse();
                        setChatMessages(msgs);
                    });
                };

                init();
                return () => {
                    if (unsubscribeAuth) unsubscribeAuth();
                    if (unsubscribeChat) unsubscribeChat();
                };
            }, []);

            const handleLogin = async () => {
                const { auth, googleProvider, signInWithRedirect } = window.firebaseApp;
                setStatus("جاري تحويلك لتسجيل الدخول...");
                try {
                    await signInWithRedirect(auth, googleProvider);
                } catch (error) {
                    setStatus("فشل بدء تسجيل الدخول.");
                }
            };

            const handleLogout = () => window.firebaseApp.signOut(window.firebaseApp.auth);

            const sendMessage = async (e) => {
                e.preventDefault();
                if (!message.trim() || !user) return;
                
                const { db, collection, addDoc, serverTimestamp } = window.firebaseApp;
                try {
                    await addDoc(collection(db, "messages"), {
                        text: message,
                        uid: user.uid,
                        displayName: user.displayName,
                        photoURL: user.photoURL,
                        createdAt: serverTimestamp()
                    });
                    setMessage("");
                } catch (error) {
                    setStatus("فشل إرسال الرسالة.");
                }
            };

            if (loading) return (
                <div className="h-screen flex items-center justify-center">
                    <div className="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
                </div>
            );

            return (
                <div className="max-w-md mx-auto h-screen flex flex-col bg-white shadow-2xl overflow-hidden">
                    {/* Header */}
                    <header className="p-4 border-b flex justify-between items-center glass sticky top-0 z-10">
                        <div className="flex items-center gap-2">
                            <div className="bg-blue-600 p-1.5 rounded-lg">
                                <i data-lucide="message-circle" className="w-5 h-5 text-white"></i>
                            </div>
                            <h1 className="font-bold text-lg text-slate-800">دردشة المجموعات</h1>
                        </div>
                        {user ? (
                            <div className="flex items-center gap-3">
                                <img src={user.photoURL} className="w-8 h-8 rounded-full border border-slate-200" referrerPolicy="no-referrer" />
                                <button onClick={handleLogout} className="text-slate-400 hover:text-red-500 transition-colors">
                                    <i data-lucide="log-out" className="w-5 h-5"></i>
                                </button>
                            </div>
                        ) : (
                            <button onClick={handleLogin} className="bg-blue-600 hover:bg-blue-700 text-white px-4 py-1.5 rounded-full text-sm font-bold transition-all shadow-sm">
                                تسجيل الدخول
                            </button>
                        )}
                    </header>

                    {/* Status Bar */}
                    {status && <div className="bg-blue-50 text-blue-700 text-[11px] py-1 px-4 text-center border-b border-blue-100">{status}</div>}

                    {/* Messages Area */}
                    <div className="flex-grow overflow-y-auto p-4 space-y-4 bg-slate-50/50 chat-container">
                        {chatMessages.length === 0 ? (
                            <div className="h-full flex flex-col items-center justify-center text-slate-400">
                                <i data-lucide="messages-square" className="w-12 h-12 mb-2 opacity-20"></i>
                                <p className="text-sm">لا توجد رسائل بعد. ابدأ المحادثة!</p>
                            </div>
                        ) : (
                            chatMessages.map(msg => (
                                <div key={msg.id} className={`flex ${msg.uid === user?.uid ? 'justify-start' : 'justify-end'}`}>
                                    <div className={`max-w-[85%] p-3 rounded-2xl text-sm shadow-sm ${
                                        msg.uid === user?.uid 
                                        ? 'bg-blue-600 text-white rounded-tr-none' 
                                        : 'bg-white text-slate-800 rounded-tl-none border border-slate-100'
                                    }`}>
                                        <div className="flex items-center gap-1.5 mb-1">
                                            <p className={`text-[10px] font-bold ${msg.uid === user?.uid ? 'text-blue-100' : 'text-blue-600'}`}>
                                                {msg.displayName}
                                            </p>
                                        </div>
                                        <p className="leading-relaxed">{msg.text}</p>
                                    </div>
                                </div>
                            ))
                        )}
                        <div ref={scrollRef} />
                    </div>

                    {/* Input Area */}
                    <footer className="p-4 border-t glass bg-white">
                        <form onSubmit={sendMessage} className="flex gap-2">
                            <input 
                                type="text" 
                                value={message}
                                onChange={(e) => setMessage(e.target.value)}
                                disabled={!user}
                                placeholder={user ? "اكتب رسالتك..." : "سجل الدخول للمشاركة في الدردشة"}
                                className="flex-grow p-3 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm transition-all bg-slate-50/50"
                            />
                            <button 
                                disabled={!user || !message.trim()} 
                                className="bg-blue-600 hover:bg-blue-700 text-white p-3 rounded-2xl disabled:opacity-50 disabled:hover:bg-blue-600 transition-all shadow-md shadow-blue-200"
                            >
                                <i data-lucide="send" className="w-5 h-5"></i>
                            </button>
                        </form>
                        {!user && <p className="text-[10px] text-slate-400 mt-2 text-center italic">يجب تسجيل الدخول لتتمكن من إرسال الرسائل.</p>}
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        
        // Initialize icons
        const initIcons = () => {
            if (window.lucide) {
                lucide.createIcons();
            } else {
                setTimeout(initIcons, 100);
            }
        };
        initIcons();
        
        // Re-initialize icons on any DOM change or button click
        document.addEventListener('click', () => setTimeout(() => lucide.createIcons(), 100));
    </script>
</body>
</html>
